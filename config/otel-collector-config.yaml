# =============================================================================
# OrchestraACME — OpenTelemetry Collector Configuration v3
# Full GenAI Semantic Convention pipeline
# =============================================================================

extensions:
  health_check:
    endpoint: "0.0.0.0:13133"
  pprof:
    endpoint: "0.0.0.0:1777"

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
        max_recv_msg_size_mib: 32
      http:
        endpoint: "0.0.0.0:4318"
        cors:
          allowed_origins: ["*"]
          allowed_headers: ["*"]

processors:
  batch:
    send_batch_size: 256
    timeout: 2s
    send_batch_max_size: 512

  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  # Inject ACME environment resource attributes on every event
  resource:
    attributes:
      - key: deployment.environment
        value: "acme-banking-production"
        action: upsert
      - key: service.namespace
        value: "acme-banking-group"
        action: upsert
      - key: orchestraacme.version
        value: "3.0.0"
        action: upsert
      - key: llm.runtime
        value: "ollama"
        action: upsert

  # Promote GenAI semantic convention fields to top-level indexed attributes
  attributes:
    actions:
      # Mask any PII in prompt content before it reaches Splunk
      - key: gen_ai.input.messages
        action: hash
        pattern: "account_number:[0-9]+"
      # Ensure sourcetype is always correct
      - key: meta.sourcetype
        value: "otel:agentic:json"
        action: insert

exporters:
  # Primary: Splunk HEC — all parameters from .env via Docker Compose injection
  splunk_hec:
    endpoint: "${SPLUNK_HEC_ENDPOINT}"
    token: "${SPLUNK_HEC_TOKEN}"
    index: "${SPLUNK_HEC_INDEX}"
    sourcetype: "${SPLUNK_HEC_SOURCETYPE}"
    source: "otel-collector-mesh"
    tls:
      insecure_skip_verify: ${SPLUNK_HEC_TLS_SKIP_VERIFY}
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 1000
    timeout: 15s
    heartbeat:
      interval: 30s

  # Debug: stdout for pipeline validation
  debug:
    verbosity: normal
    sampling_initial: 3
    sampling_thereafter: 20

  # Archive: raw event JSONL on shared volume
  file:
    path: /var/log/defenseclaw/otel-raw-genai.jsonl
    rotation:
      max_megabytes: 200
      max_days: 7
      max_backups: 5

service:
  extensions: [health_check, pprof]
  pipelines:
    # Logs: LLM call records, security events, agent decisions
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, attributes, batch]
      exporters: [splunk_hec, debug, file]

    # Traces: distributed spans across agent-to-agent calls
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [splunk_hec, debug, file]

    # Metrics: token counts, latency histograms, error rates
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [splunk_hec, debug]

  telemetry:
    logs:
      level: "info"
    metrics:
      level: "detailed"
      address: "0.0.0.0:8889"
