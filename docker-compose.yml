version: "3.9"

# =============================================================================
# OrchestraACME — Live AI Security Range
# 5-service mesh: banking_app | attack_panel | otel_collector | ollama | splunk
#
# SPLUNK MODE (set in .env):
#   SPLUNK_MODE=local    → runs Splunk as a container (default)
#   SPLUNK_MODE=external → skips Splunk container; OTel ships to your own instance
#
# Local mode:
#   docker compose --profile local up --build -d
#
# External Splunk mode:
#   docker compose -f docker-compose.yml -f docker-compose.external.yml up --build -d
# =============================================================================

networks:
  acme_mesh:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  shared_telemetry:
    driver: local
  ollama_models:
    driver: local

services:

  # ---------------------------------------------------------------------------
  # OLLAMA — Local LLM runtime, auto-pulls llama3.2:1b on first start
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: acme_ollama
    networks:
      - acme_mesh
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
      - ./scripts/ollama_init.sh:/ollama_init.sh:ro
    entrypoint: ["/bin/bash", "/ollama_init.sh"]
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_MAX_LOADED_MODELS=1
    deploy:
      resources:
        limits:
          memory: 4G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ---------------------------------------------------------------------------
  # BANKING APP — Real 4-agent LLM loop with OTel GenAI instrumentation
  # ---------------------------------------------------------------------------
  banking_app:
    build:
      context: .
      dockerfile: apps/Dockerfile.banking
    container_name: acme_banking_app
    ports:
      - "5000:5000"
    networks:
      - acme_mesh
    volumes:
      - shared_telemetry:/var/log/defenseclaw
    environment:
      - FLASK_ENV=development
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:1b}
      - OTEL_COLLECTOR_HTTP=http://otel_collector:4318
      - OTEL_COLLECTOR_GRPC=otel_collector:4317
      - OTEL_SERVICE_NAME=acme-banking-fabric
      - OTEL_SERVICE_VERSION=3.0.0
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=production,service.namespace=acme-banking-group
      - SPLUNK_HEC_TOKEN=${SPLUNK_HEC_TOKEN:-acme-hec-token-0000-1111-2222-3333}
      - ACME_ENV=production
      - DEFENSECLAW_ENABLED=true
      - CODEGUARD_ENABLED=true
    depends_on:
      ollama:
        condition: service_healthy
      otel_collector:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # ATTACK PANEL — Adversarial prompt injection terminal
  # ---------------------------------------------------------------------------
  attack_panel:
    build:
      context: .
      dockerfile: apps/Dockerfile.attack
    container_name: acme_attack_panel
    ports:
      - "5001:5001"
    networks:
      - acme_mesh
    volumes:
      - shared_telemetry:/var/log/defenseclaw
    environment:
      - FLASK_ENV=development
      - BANKING_APP_URL=http://banking_app:5000
    depends_on:
      banking_app:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # OTEL COLLECTOR — Telemetry mesh backbone
  # ---------------------------------------------------------------------------
  otel_collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: acme_otel_collector
    networks:
      - acme_mesh
    volumes:
      - ./config/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
      - shared_telemetry:/var/log/defenseclaw
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    environment:
      - SPLUNK_HEC_ENDPOINT=${SPLUNK_HEC_ENDPOINT:-http://splunk:8088/services/collector/event}
      - SPLUNK_HEC_TOKEN=${SPLUNK_HEC_TOKEN:-acme-hec-token-0000-1111-2222-3333}
      - SPLUNK_HEC_INDEX=${SPLUNK_HEC_INDEX:-acme_agentic_telemetry}
      - SPLUNK_HEC_SOURCETYPE=${SPLUNK_HEC_SOURCETYPE:-otel:agentic:json}
      - SPLUNK_HEC_TLS_SKIP_VERIFY=${SPLUNK_HEC_TLS_SKIP_VERIFY:-true}
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133/"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # SPLUNK — Local SIEM (profile: local — skipped in external mode)
  # ---------------------------------------------------------------------------
  splunk:
    image: ${SPLUNK_IMAGE:-splunk/splunk:9.2.1}
    container_name: acme_splunk
    profiles:
      - local
    ports:
      - "8000:8000"
      - "8088:8088"
    networks:
      - acme_mesh
    volumes:
      - shared_telemetry:/var/log/defenseclaw
    environment:
      - SPLUNK_START_ARGS=--accept-license
      - SPLUNK_PASSWORD=${SPLUNK_PASSWORD:-ACMEPassword2026!}
      - SPLUNK_HEC_TOKEN=${SPLUNK_LOCAL_HEC_TOKEN:-acme-hec-token-0000-1111-2222-3333}
      - SPLUNK_ENABLE_LISTEN=9997
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/en-US/account/login"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
