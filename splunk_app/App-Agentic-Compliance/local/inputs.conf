# =============================================================================
# OrchestraACME — App-Agentic-Compliance
# local/inputs.conf — HTTP Event Collector (HEC) Receiver Stanzas
# =============================================================================
#
# Deploy on Indexer / Heavy Forwarder tier. These stanzas bind the OrchestraACME
# OTel Collector HEC token to index=security and sourcetype=cisco:aidefense:json.
#
# Token value must match SPLUNK_HEC_TOKEN in docker-compose.yml and the OTel
# splunk_hec exporter token in config/otel-collector-config.yaml.
# =============================================================================

[http://orchestra_acme_aidefense_hec]
connection_host = ip
disabled = 0
index = security
sourcetype = cisco:aidefense:json
token = 00000000-0000-4000-8000-ACMEHECLOCAL01
description = OrchestraACME Cisco AI Defense telemetry via OTel Collector HEC

[http://orchestra_acme_aidefense_hec://remote]
disabled = 0
index = security
sourcetype = cisco:aidefense:json
