# =============================================================================
# OrchestraACME — App-Agentic-Compliance
# local/props.conf — Strict Parsing & Field Extraction
# =============================================================================

[cisco:aidefense:json]
# --- Strict line handling ---------------------------------------------------
SHOULD_LINEMERGE = false
TRUNCATE = 0
LINE_BREAKER = ([\r\n]+)\Z
BREAK_ONLY_BEFORE_DATE = false
MAX_EVENTS = 256
ANNOTATE_PUNCT = false
NO_BINARY_CHECK = true

# --- JSON parsing -----------------------------------------------------------
KV_MODE = json
INDEXED_EXTRACTIONS = json
CHARSET = UTF-8

# --- Primary timestamp: Cisco AI Defense embedded ISO-8601 alert timestamp --
TIME_PREFIX = "timestamp"\s*:\s*"
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%Q%z
MAX_TIMESTAMP_LOOKAHEAD = 40

# --- OpenTelemetry nested log record timestamp (nanosecond epoch fallback) ---
# OTLP HTTP /v1/logs payload path:
#   resourceLogs[].scopeLogs[].logRecords[].timeUnixNano
EXTRACT-otel_time_unixnano = "timeUnixNano"\s*:\s*"(?P<otel_time_unixnano>\d+)"
EXTRACT-otel_severity = "severityText"\s*:\s*"(?P<otel_severity_text>[^"]+)"

# --- OpenTelemetry body envelope (JSON stringValue wrapper) -----------------
EXTRACT-otel_body_string = "body"\s*:\s*\{\s*"stringValue"\s*:\s*"(?P<otel_body_json>(?:\\.|[^"\\])*)"

# --- Cisco AI Defense platform fields (embedded in body or top-level JSON) ---
EXTRACT-cisco_event_timestamp = "timestamp"\s*:\s*"(?P<cisco_event_timestamp>[^"]+)"
EXTRACT-event_id = "event_id"\s*:\s*"(?P<event_id>[^"]+)"
EXTRACT-finding_type = "finding_type"\s*:\s*"(?P<finding_type>[^"]+)"
EXTRACT-policy_action = "policy_action"\s*:\s*"(?P<policy_action>[^"]+)"
EXTRACT-threat_category = "threat_category"\s*:\s*"(?P<threat_category>[^"]+)"
EXTRACT-cisco_agent_name = "agent_name"\s*:\s*"(?P<cisco_agent_name>[^"]+)"
EXTRACT-transaction_id = "transaction_id"\s*:\s*"(?P<transaction_id>[^"]+)"
EXTRACT-scan_target = "scan_target"\s*:\s*"(?P<scan_target>[^"]+)"
EXTRACT-matched_indicator = "matched_indicator"\s*:\s*"(?P<matched_indicator>[^"]+)"
EXTRACT-platform = "platform"\s*:\s*"(?P<cisco_platform>[^"]+)"

# --- Cisco threat taxonomy (nested cisco_threat_taxonomy object) ------------
EXTRACT-cisco_aidefense_objective = "objective"\s*:\s*"(?P<cisco_aidefense_objective>[^"]+)"
EXTRACT-cisco_aidefense_technique = "technique"\s*:\s*"(?P<cisco_aidefense_technique>[^"]+)"
EXTRACT-cisco_aidefense_subtechnique = "subtechnique"\s*:\s*"(?P<cisco_aidefense_subtechnique>[^"]+)"

# --- OpenTelemetry GenAI semantic convention token usage fields ---------------
EXTRACT-gen_ai_system = "gen_ai\.system"\s*:\s*"(?P<gen_ai_system>[^"]+)"
EXTRACT-gen_ai_request_model = "gen_ai\.request\.model"\s*:\s*"(?P<gen_ai_request_model>[^"]+)"
EXTRACT-gen_ai_operation_name = "gen_ai\.operation\.name"\s*:\s*"(?P<gen_ai_operation_name>[^"]+)"
EXTRACT-gen_ai_input_tokens = "gen_ai\.usage\.input_tokens"\s*:\s*(?P<gen_ai_input_tokens>\d+)
EXTRACT-gen_ai_output_tokens = "gen_ai\.usage\.output_tokens"\s*:\s*(?P<gen_ai_output_tokens>\d+)

# --- Field aliases for dashboard / lookup join compatibility ----------------
FIELDALIAS-aidefense_objective = cisco_threat_taxonomy.objective AS cisco_aidefense_objective
FIELDALIAS-aidefense_technique = cisco_threat_taxonomy.technique AS cisco_aidefense_technique
FIELDALIAS-aidefense_subtechnique = cisco_threat_taxonomy.subtechnique AS cisco_aidefense_subtechnique
FIELDALIAS-otel_attr_objective = cisco_threat_taxonomy.objective AS cisco_aidefense_objective
FIELDALIAS-otel_attr_technique = cisco_threat_taxonomy.technique AS cisco_aidefense_technique
FIELDALIAS-otel_attr_subtechnique = cisco_threat_taxonomy.subtechnique AS cisco_aidefense_subtechnique

# --- Calculated fields: normalize OpenTelemetry nanosecond epoch to _time ----
# Applied at search-time via field alias reference in dashboard SPL.
# otel_time_unixnano / 1000000000 converts OTLP nanoseconds to Unix epoch seconds.

# --- Evaluation aliases (search-time enrichment hint) -----------------------
EVAL-total_gen_ai_tokens = if(isnotnull(gen_ai_input_tokens) AND isnotnull(gen_ai_output_tokens), gen_ai_input_tokens + gen_ai_output_tokens, null())
EVAL-otel_event_time = if(isnotnull(otel_time_unixnano), strftime(tonumber(otel_time_unixnano) / 1000000000, "%Y-%m-%dT%H:%M:%S.%3N%z"), null())
