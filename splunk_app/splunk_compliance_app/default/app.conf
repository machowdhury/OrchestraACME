# =============================================================================
# ACME GenAI Compliance App
# Package ID must match the root folder name in the installable .tar.gz
# =============================================================================

[install]
is_configured = 0
state = enabled
build = 1

[launcher]
author = Mahamudul Alam Chowdhury
description = Universal GenAI and Agentic AI Compliance App for Splunk Cloud, Splunk Enterprise, and local OrchestraACME labs. Works with otel:agentic:json sourcetype data from OrchestraACME or any compatible agentic telemetry source.
version = 2.2.0
url = https://github.com/machowdhury/OrchestraACME

[package]
id = acme_genai_compliance
check_for_updates = 0

[ui]
is_visible = 1
label = GenAI Compliance Monitor
setup_view = splunk_cloud_setup

[triggers]
reload.lookup_table_files = simple
reload.macros = simple
reload.transforms = simple
