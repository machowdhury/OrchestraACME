# =============================================================================
# ACME GenAI Compliance App — Macros
# =============================================================================
# To point this app at your own data:
#   1. Edit the acme_genai_index macro below
#   2. Change the index name and/or sourcetype to match your environment
#   3. All 30+ saved searches will automatically use your data source

[acme_genai_index]
definition = index=acme_agentic_telemetry sourcetype="otel:agentic:json"
iseval = 0

[acme_genai_index(1)]
args = extra_filter
definition = index=acme_agentic_telemetry sourcetype="otel:agentic:json" $extra_filter$
iseval = 0

# Time window macros for dashboard panels
[acme_last_24h]
definition = earliest=-24h latest=now
iseval = 0

[acme_last_7d]
definition = earliest=-7d latest=now
iseval = 0

[acme_last_30d]
definition = earliest=-30d latest=now
iseval = 0

# Risk score thresholds (editable without touching searches)
[acme_critical_cvss]
definition = 9.0
iseval = 0

[acme_high_cvss]
definition = 7.0
iseval = 0

[acme_medium_cvss]
definition = 4.0
iseval = 0

# Scenario index macros (telemetry field campaign_week = 1–10)
[acme_campaign_w1]
definition = `acme_genai_index` (campaign_week=1 OR cisco_aibom_status=* OR agent.aibom_validated=*)
iseval = 0

[acme_campaign_w2]
definition = `acme_genai_index` (campaign_week=2 OR foundry.trace_id=* OR foundry.orchestrator_override=*)
iseval = 0

[acme_campaign_w3]
definition = `acme_genai_index` (campaign_week=3 OR codeguard_blocked=true OR codeguard.rule_id=*)
iseval = 0

[acme_campaign_w4]
definition = `acme_genai_index` (campaign_week=4 OR slm.unapproved=true OR deployment.tier=shadow)
iseval = 0

[acme_campaign_w5]
definition = `acme_genai_index` (campaign_week=5 OR defenseclaw.action=HARD_DENY OR defenseclaw_blocked=true)
iseval = 0

[acme_campaign_w6]
definition = `acme_genai_index` (campaign_week=6 OR tool.scope_violation=true OR mcp.gateway.action=BLOCK)
iseval = 0

[acme_campaign_w7]
definition = `acme_genai_index` (campaign_week=7 OR call_depth_detected>=5)
iseval = 0

[acme_campaign_w8]
definition = `acme_genai_index` (campaign_week=8 OR cryptographic_passport_valid=false OR a2a.verification_failure=*)
iseval = 0

[acme_campaign_w9]
definition = `acme_genai_index` (campaign_week=9 OR galileo_observe_alert=true OR galileo_anomaly_score=*)
iseval = 0

[acme_campaign_w10]
definition = `acme_genai_index` (campaign_week=10 OR containment.action=QUARANTINE OR memory.policy.rule_id=MEM-POL-*)
iseval = 0
