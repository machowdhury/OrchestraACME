# =============================================================================
# ACME GenAI Compliance App — Field Extraction (ships with app)
# Applies on Splunk Enterprise and Splunk Cloud search heads.
# HEC ingestion is configured separately (see INSTALL.md / Setup Guide dashboard).
# =============================================================================

[otel:agentic:json]
SHOULD_LINEMERGE = false
TRUNCATE = 0
LINE_BREAKER = ([\r\n]+)\Z
MAX_EVENTS = 256
ANNOTATE_PUNCT = false
NO_BINARY_CHECK = true
KV_MODE = json
INDEXED_EXTRACTIONS = json
CHARSET = UTF-8

# Primary timestamp from embedded event timestamp
TIME_PREFIX = "timestamp"\s*:\s*"
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%Q%z
MAX_TIMESTAMP_LOOKAHEAD = 40

# OpenTelemetry envelope fallbacks
EXTRACT-otel_time_unixnano = "timeUnixNano"\s*:\s*"(?P<otel_time_unixnano>\d+)"

# GenAI semantic convention fields
EXTRACT-gen_ai_system = "gen_ai\.system"\s*:\s*"(?P<gen_ai_system>[^"]+)"
EXTRACT-gen_ai_request_model = "gen_ai\.request\.model"\s*:\s*"(?P<gen_ai_request_model>[^"]+)"
EXTRACT-gen_ai_operation_name = "gen_ai\.operation\.name"\s*:\s*"(?P<gen_ai_operation_name>[^"]+)"
EXTRACT-gen_ai_input_tokens = "gen_ai\.usage\.input_tokens"\s*:\s*(?P<gen_ai_input_tokens>\d+)
EXTRACT-gen_ai_output_tokens = "gen_ai\.usage\.output_tokens"\s*:\s*(?P<gen_ai_output_tokens>\d+)

# DefenseClaw / CodeGuard security fields
EXTRACT-defenseclaw_action = "defenseclaw\.action"\s*:\s*"(?P<defenseclaw_action>[^"]+)"
EXTRACT-defenseclaw_blocked = "defenseclaw_blocked"\s*:\s*(?P<defenseclaw_blocked>true|false)
EXTRACT-codeguard_blocked = "codeguard_blocked"\s*:\s*(?P<codeguard_blocked>true|false)

# Framework / kill-chain correlation fields
EXTRACT-technique_id = "technique_id"\s*:\s*"(?P<technique_id>[^"]+)"
EXTRACT-framework_technique_id = "framework\.technique_id"\s*:\s*"(?P<framework_technique_id>[^"]+)"
EXTRACT-incident_id = "incident_id"\s*:\s*"(?P<incident_id>[^"]+)"
EXTRACT-chain_id = "chain_id"\s*:\s*"(?P<chain_id>[^"]+)"
EXTRACT-chain_name = "chain_name"\s*:\s*"(?P<chain_name>[^"]+)"
EXTRACT-execution_mode = "execution_mode"\s*:\s*"(?P<execution_mode>[^"]+)"
EXTRACT-testbed_mode = "testbed_mode"\s*:\s*"(?P<testbed_mode>[^"]+)"
EXTRACT-rogue_actor_story = "rogue_actor_story"\s*:\s*"(?P<rogue_actor_story>[^"]+)"
EXTRACT-risk_statement = "risk_statement"\s*:\s*"(?P<risk_statement>[^"]+)"
EXTRACT-requesting_agent_id = "requesting_agent_id"\s*:\s*"(?P<requesting_agent_id>[^"]+)"
EXTRACT-target_agent_id = "target_agent_id"\s*:\s*"(?P<target_agent_id>[^"]+)"

# Agent identity fields
EXTRACT-agent_id = "agent\.id"\s*:\s*"(?P<agent_id>[^"]+)"
EXTRACT-gen_ai_agent_id = "gen_ai\.agent\.id"\s*:\s*"(?P<gen_ai_agent_id>[^"]+)"
EXTRACT-gen_ai_agent_name = "gen_ai\.agent\.name"\s*:\s*"(?P<gen_ai_agent_name>[^"]+)"

# Session / trace correlation
EXTRACT-session_id = "session_id"\s*:\s*"(?P<session_id>[^"]+)"
EXTRACT-trace_id = "trace_id"\s*:\s*"(?P<trace_id>[^"]+)"
