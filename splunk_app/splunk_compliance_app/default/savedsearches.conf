[GenAI Compliance - CSA MAESTRO Layer Coverage]
search = `acme_genai_index` \
| lookup acme_framework_lookup technique_id AS framework.technique_id OUTPUTNEW maestro_layers \
| mvexpand maestro_layers \
| where isnotnull(maestro_layers) AND maestro_layers != "" \
