# =============================================================================
# ACME GenAI Compliance App — Saved Searches & Detection Rules
# Universal: works with any otel:agentic:json sourcetype source
# =============================================================================
# All searches use the `acme_genai_index` macro so customers can point
# this app at their own index by editing macros.conf only.

# =============================================================================
# SECTION 1: FRAMEWORK COMPLIANCE SUMMARIES
# =============================================================================

[GenAI Compliance - MITRE ATLAS Coverage Summary]
search = `acme_genai_index` \
| lookup acme_framework_lookup technique_id AS framework.technique_id OUTPUTNEW technique_name tactic_name severity cvss_score owasp_llm owasp_asi maestro_layers kill_chain_stage \
| stats dc(framework.technique_id) AS unique_techniques_observed, count AS total_events, avg(framework.cvss_score) AS avg_cvss, max(framework.cvss_score) AS max_cvss BY framework.tactic_name \
| eval compliance_risk = case(max_cvss >= 9.0, "CRITICAL", max_cvss >= 7.0, "HIGH", max_cvss >= 4.0, "MEDIUM", 1=1, "LOW") \
| sort -max_cvss \
| rename framework.tactic_name AS "MITRE ATLAS Tactic", unique_techniques_observed AS "Techniques Observed", total_events AS "Total Events", avg_cvss AS "Avg CVSS", max_cvss AS "Max CVSS", compliance_risk AS "Risk Level"
dispatch.earliest_time = -7d
dispatch.latest_time = now
enableSched = 1
disabled = 1
cron_schedule = 0 * * * *
alert.track = 0
description = Summarises observed MITRE ATLAS techniques by tactic for compliance dashboard

[GenAI Compliance - OWASP LLM Top 10 Coverage]
search = `acme_genai_index` \
| lookup acme_framework_lookup technique_id AS framework.technique_id OUTPUTNEW owasp_llm \
| mvexpand owasp_llm \
| where isnotnull(owasp_llm) AND owasp_llm != "" \
| stats dc(framework.technique_id) AS techniques_fired, count AS events, max(framework.cvss_score) AS max_cvss BY owasp_llm \
| join type=left owasp_llm [| inputlookup acme_owasp_llm_lookup | rename id AS owasp_llm] \
| eval risk_status = case(events > 0 AND max_cvss >= 9.0, "CRITICAL_ACTIVE", events > 0 AND max_cvss >= 7.0, "HIGH_ACTIVE", events > 0, "ACTIVE", 1=1, "NOT_OBSERVED") \
| sort owasp_llm
dispatch.earliest_time = -7d
dispatch.latest_time = now
enableSched = 1
disabled = 1
cron_schedule = 15 * * * *
alert.track = 0
description = OWASP LLM Top 10 compliance posture — which risks have fired

