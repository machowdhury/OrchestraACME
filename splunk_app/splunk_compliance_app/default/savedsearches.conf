# =============================================================================
# SECTION 4: COMPLIANCE POSTURE SCORING
# =============================================================================

[GenAI Compliance - Compliance Score: OWASP LLM]
search = `acme_genai_index` \
| lookup acme_framework_lookup technique_id AS framework.technique_id OUTPUTNEW owasp_llm \
| mvexpand owasp_llm \
| where owasp_llm != "" \
| stats dc(owasp_llm) AS risks_observed BY _time \
| appendcols [| stats count | eval total_risks=10 | table total_risks] \
| eval compliance_score = round((1 - (risks_observed / total_risks)) * 100, 1) \
| eval grade = case(compliance_score >= 90, "A", compliance_score >= 80, "B", compliance_score >= 70, "C", compliance_score >= 60, "D", 1=1, "F") \
| table compliance_score grade risks_observed total_risks
dispatch.earliest_time = -7d
dispatch.latest_time = now
enableSched = 1
disabled = 1
cron_schedule = 0 6 * * *
alert.track = 0
description = Daily OWASP LLM Top 10 compliance score calculation

[GenAI Compliance - Compliance Score: OWASP ASI Agentic]
search = `acme_genai_index` \
| lookup acme_framework_lookup technique_id AS framework.technique_id OUTPUTNEW owasp_asi \
| mvexpand owasp_asi \
| where owasp_asi != "" \
| stats dc(owasp_asi) AS risks_observed \
| eval total_risks=10 \
| eval compliance_score = round((1 - (risks_observed / total_risks)) * 100, 1) \
| eval grade = case(compliance_score >= 90, "A", compliance_score >= 80, "B", compliance_score >= 70, "C", compliance_score >= 60, "D", 1=1, "F") \
| table compliance_score grade risks_observed total_risks
dispatch.earliest_time = -7d
dispatch.latest_time = now
enableSched = 1
disabled = 1
cron_schedule = 5 6 * * *
alert.track = 0
description = Daily OWASP ASI Agentic Top 10 compliance score

[GenAI Compliance - Compliance Score: NIST AI RMF]
search = `acme_genai_index` \
| lookup acme_framework_lookup technique_id AS framework.technique_id OUTPUTNEW nist_ai_rmf \
| mvexpand nist_ai_rmf \
| where nist_ai_rmf != "" \
| stats dc(nist_ai_rmf) AS controls_at_risk, count AS total_events BY nist_ai_rmf \
| eval rmf_function = replace(nist_ai_rmf, "-.*", "") \
| stats dc(controls_at_risk) AS controls_at_risk_count, sum(total_events) AS events BY rmf_function \
| eval function_status = case(events > 0, "AT_RISK", 1=1, "COMPLIANT")
dispatch.earliest_time = -7d
dispatch.latest_time = now
enableSched = 1
disabled = 1
cron_schedule = 10 6 * * *
alert.track = 0
description = NIST AI RMF control coverage and risk status

[GenAI Compliance - Agent Behavioral Baseline Drift]
search = `acme_genai_index` \
| stats count AS events, dc(framework.technique_id) AS unique_techniques, avg(framework.cvss_score) AS avg_cvss BY agent.id \
| join agent.id [search `acme_genai_index` earliest=-30d latest=-7d | stats avg(framework.cvss_score) AS baseline_cvss BY agent.id] \
| eval cvss_delta = round(avg_cvss - baseline_cvss, 2) \
| eval drift_status = case(cvss_delta > 2.0, "SIGNIFICANT_DRIFT", cvss_delta > 0.5, "MILD_DRIFT", cvss_delta < -0.5, "IMPROVING", 1=1, "STABLE") \
| table agent.id events unique_techniques avg_cvss baseline_cvss cvss_delta drift_status
dispatch.earliest_time = -7d
dispatch.latest_time = now
enableSched = 1
disabled = 1
cron_schedule = 30 6 * * *
alert.track = 0
description = Per-agent behavioral baseline drift detection over 30-day rolling window

# =============================================================================
# SECTION 5: DATASET EXPORT TRACKING
# =============================================================================

[GenAI Compliance - Dataset Export Summary]
search = `acme_genai_index` \
| stats count AS total_events, dc(framework.technique_id) AS unique_techniques, dc(incident_id) AS unique_incidents, min(_time) AS earliest_event, max(_time) AS latest_event \
| eval dataset_readiness = case(total_events > 1000 AND unique_techniques > 20, "READY_FOR_HF_EXPORT", total_events > 100, "PARTIAL", 1=1, "INSUFFICIENT_DATA") \
| convert ctime(earliest_event) ctime(latest_event)
dispatch.earliest_time = -30d
dispatch.latest_time = now
enableSched = 0
alert.track = 0
description = Dataset volume summary for HuggingFace export readiness assessment
