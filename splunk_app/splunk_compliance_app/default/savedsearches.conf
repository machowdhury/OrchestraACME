disabled = 1
cron_schedule = 45 * * * *
alert.track = 0
description = CSA MAESTRO 7-layer coverage and risk by layer

# =============================================================================
# SECTION 2: KILL-CHAIN CORRELATION DETECTIONS
# =============================================================================

[GenAI Compliance - Kill-Chain Detection: Multi-Stage Attack]
search = `acme_genai_index` incident_id=* \
| stats values(framework.technique_id) AS technique_chain, values(framework.tactic_name) AS tactic_chain, dc(framework.kill_chain_stage) AS stages_observed, min(_time) AS chain_start, max(_time) AS chain_end, max(framework.cvss_score) AS max_cvss, values(agent.id) AS agents_involved, first(chain_name) AS chain_name, first(scenario_family) AS scenario_family BY incident_id \
| eval dwell_minutes = round((chain_end - chain_start) / 60, 1) \
| eval technique_count = mvcount(technique_chain) \
| where technique_count >= 2 \
| eval severity = case(max_cvss >= 9.0, "CRITICAL", max_cvss >= 7.0, "HIGH", max_cvss >= 4.0, "MEDIUM", 1=1, "LOW") \
| eval chain_summary = mvjoin(technique_chain, " → ") \
| sort -max_cvss \
| rename incident_id AS "Incident ID", chain_name AS "Scenario", technique_count AS "Stages Fired", stages_observed AS "Kill-Chain Stages", max_cvss AS "Max CVSS", severity AS "Severity", dwell_minutes AS "Dwell (min)", chain_summary AS "Technique Chain"
dispatch.earliest_time = -24h
dispatch.latest_time = now
enableSched = 1
disabled = 1
cron_schedule = */5 * * * *
alert.track = 1
alert.severity = 4
alert.suppress = 1
alert.suppress.period = 1h
alert.suppress.fields = incident_id
counttype = number of events
relation = greater than
quantity = 0
description = Detects multi-stage kill-chain attack scenarios correlated by incident_id

[GenAI Compliance - Kill-Chain: Reconnaissance to Exfiltration]
search = `acme_genai_index` incident_id=* \
| stats values(framework.kill_chain_stage) AS stages BY incident_id \
| where mvfind(stages, "Reconnaissance") >= 0 AND (mvfind(stages, "Exfiltration") >= 0 OR mvfind(stages, "Collection") >= 0) \
| join incident_id [search `acme_genai_index` | stats max(framework.cvss_score) AS max_cvss, count AS events BY incident_id] \
| eval alert_message = "Full recon-to-exfil kill chain detected. Incident: " . incident_id
dispatch.earliest_time = -1h
dispatch.latest_time = now
enableSched = 1
disabled = 1
cron_schedule = */2 * * * *
alert.track = 1
alert.severity = 5
description = Critical: detects complete recon-to-exfiltration kill chain

[GenAI Compliance - Kill-Chain: Privilege Escalation Sequence]
search = `acme_genai_index` incident_id=* \
| stats values(framework.kill_chain_stage) AS stages, max(framework.cvss_score) AS max_cvss BY incident_id \
| where mvfind(stages, "PrivilegeEscalation") >= 0 AND max_cvss >= 8.0
dispatch.earliest_time = -1h
dispatch.latest_time = now
